# Apache hardening include for deployments serving this repository in-place.
# Prefer a dedicated public/ document root when possible. If this repo remains
# under /var/www/html, include equivalent rules in the vhost/server config
# because many systems disable .htaccess with AllowOverride None.

<Directory "/var/www/html/ScytaleDroid-Web">
    Options -Indexes -MultiViews +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<DirectoryMatch "^/var/www/html/ScytaleDroid-Web/(\.git|config|database|lib)(/|$)">
    Require all denied
</DirectoryMatch>

<FilesMatch "^(AGENTS\.md|CONTRIBUTING\.md|README\.md|SECURITY\.md|LICENSE|setup\.sh)$">
    Require all denied
</FilesMatch>

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "same-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'"
</IfModule>
